services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: order_agent_sim
      POSTGRES_USER: order_agent_sim
      POSTGRES_PASSWORD: synthetic-local-only-password
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_agent_sim -d order_agent_sim"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - ./.local-run/postgres-data:/var/lib/postgresql/data

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLM_FALLBACK_MODE: disabled
  LLM_FALLBACK_ENABLED: "false"
  LLM_FALLBACK_SPECULATIVE_ENABLED: "false"
  ALLOW_LIVE_LLM: "false"
  VOICE_ENABLED: "false"
  TTS_ENABLED: "false"
  SPEECH_ASR_PROVIDER: disabled
  SPEECH_TTS_PROVIDER: disabled
  SPEECH_SIMULATION_ENABLED: "false"
  SPEECH_AUDIO_RETENTION_ENABLED: "false"
  SIMULATION_DATA_ONLY: "true"
  SIMULATION_HANDOFF_CONTROLS_ENABLED: "true"
  PYTHONUTF8: "1"

jobs:
  windows-baseline:
    name: Windows reproducible baseline
    runs-on: windows-latest
    # Phase 5 intentionally retains the complete Phase 0-4 regression and adds
    # offline audio/provider evaluations. GitHub's Windows runner takes about
    # twice as long as the local reproducible baseline, so keep a bounded but
    # realistic job budget.
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.13.2
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13.2"
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock.txt
            backend/requirements-dev.lock.txt

      - name: Create backend virtual environment from lock
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m venv backend\.venv
          .\backend\.venv\Scripts\python.exe -m pip install "pip==26.1.2"
          .\backend\.venv\Scripts\python.exe -m pip install -r backend\requirements.lock.txt
          .\backend\.venv\Scripts\python.exe -m pip check

      - name: Create maintenance tooling environment from lock
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -m venv .tooling-venv
          .\.tooling-venv\Scripts\python.exe -m pip install "pip==26.1.2"
          .\.tooling-venv\Scripts\python.exe -m pip install -r backend\requirements-dev.lock.txt
          .\.tooling-venv\Scripts\python.exe -m pip check
          if ((.\.tooling-venv\Scripts\python.exe -m pip --version) -notmatch '^pip 26\.1\.2 ') {
            throw "Unexpected tooling pip version"
          }

      - name: Set up Node.js 24.15.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up npm 11.12.1 and install frontend lock
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          npm install --global npm@11.12.1
          if ((npm --version) -ne "11.12.1") { throw "Unexpected npm version" }
          Push-Location frontend
          try {
            npm ci
          } finally {
            Pop-Location
          }

      - name: Run reproducible quality checks
        shell: pwsh
        run: .\scripts\check_all.ps1 -Build

      - name: Phase 4 dataset diversity validation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe scripts\validate_phase4_multilingual_catalog.py

      - name: Phase 4 unified canonical path tests
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider backend\tests\phase4\test_unified_canonical_path.py backend\tests\phase4\test_api_contract.py

      - name: Phase 4 evaluator independence tests
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider backend\tests\phase4\test_evaluator_independence.py

      - name: Phase 4 database order checks on SQLite
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider backend\tests\phase4\test_database_tenant_evaluation.py

      - name: Phase 4 complete backend tests
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider backend\tests\phase4

      - name: Phase 4 auto locale detection evaluation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B evaluation\run_phase4_multilingual_text_eval.py --mode auto

      - name: Phase 4 assisted locale evaluation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B evaluation\run_phase4_multilingual_text_eval.py --mode assisted

      - name: Phase 4 combined multilingual text evaluation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B evaluation\run_phase4_multilingual_text_eval.py

      - name: Phase 5 audio catalog validation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B scripts\validate_phase5_audio_catalog.py

      - name: Phase 5 audio validator and Replay provider tests
        shell: pwsh
        run: >-
          .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider
          backend\tests\phase5\test_audio_validator.py
          backend\tests\phase5\test_replay_providers.py

      - name: Phase 5 speech pipeline and API tests
        shell: pwsh
        run: >-
          .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider
          backend\tests\phase5\test_speech_pipeline.py
          backend\tests\phase5\test_api_contract.py

      - name: Phase 5 metric denominator and Provider invocation tests
        shell: pwsh
        run: >-
          .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider
          backend\tests\phase5\test_evaluator_independence.py

      - name: Phase 5 persistence schema and tenant isolation tests
        shell: pwsh
        run: >-
          .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider
          backend\tests\phase5\test_speech_audit_repository.py
          backend\tests\phase5\test_database_guards.py
          backend\tests\phase5\test_api_contract.py

      - name: Phase 5 complete test suite on SQLite
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B -m pytest -q -p no:cacheprovider backend\tests\phase5

      - name: Phase 5 speech pipeline evaluation on SQLite
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B evaluation\run_phase5_speech_pipeline_eval.py

      - name: Phase 5 TTS pipeline evaluation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B evaluation\run_phase5_tts_pipeline_eval.py

      - name: Frontend multilingual Vitest
        shell: pwsh
        working-directory: frontend
        run: npm test -- --run src/components/MultilingualText.test.tsx --cache=false

      - name: Phase 5 frontend simulation tests
        shell: pwsh
        working-directory: frontend
        run: >-
          npm test -- --run
          src/api/speechApi.test.ts
          src/components/SpeechReplayPanel.test.tsx
          --cache=false

      - name: Run V3 dialogue regression evaluation
        shell: pwsh
        run: >-
          .\backend\.venv\Scripts\python.exe -B
          evaluation\run_dialogue_eval_v3.py
          --dataset evaluation\dialogues_v3.jsonl
          --fail-on-regression

      - name: Run Phase 1 runtime safety policy evaluation
        shell: pwsh
        run: .\backend\.venv\Scripts\python.exe -B evaluation\run_phase1_runtime_policy_eval.py

      - name: Audit Python dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          .\.tooling-venv\Scripts\python.exe -m pip_audit -r backend\requirements.lock.txt

      - name: Audit npm dependencies
        shell: pwsh
        working-directory: frontend
        run: npm audit --audit-level=high

  postgresql-integration:
    name: PostgreSQL 17.5 integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV: test
      AUTO_MIGRATE_LOCAL: "false"
      SIMULATION_DATA_ONLY: "true"
      DEFAULT_RESTAURANT_CODE: hk-sim-restaurant-a
      DEFAULT_BRANCH_CODE: central
      DATABASE_URL: postgresql+psycopg://phase2_ci:phase2_ci_synthetic_password@127.0.0.1:5432/order_agent_phase2_ci
      PHASE2_POSTGRES_URL: postgresql+psycopg://phase2_ci:phase2_ci_synthetic_password@127.0.0.1:5432/order_agent_phase2_ci
      PHASE3_POSTGRES_URL: postgresql+psycopg://phase2_ci:phase2_ci_synthetic_password@127.0.0.1:5432/order_agent_phase2_ci
      PHASE4_POSTGRES_URL: postgresql+psycopg://phase2_ci:phase2_ci_synthetic_password@127.0.0.1:5432/order_agent_phase2_ci
      PHASE5_POSTGRES_URL: postgresql+psycopg://phase2_ci:phase2_ci_synthetic_password@127.0.0.1:5432/order_agent_phase2_ci
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_USER: phase2_ci
          POSTGRES_PASSWORD: phase2_ci_synthetic_password
          POSTGRES_DB: order_agent_phase2_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phase2_ci -d order_agent_phase2_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python 3.13.2
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13.2"
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock.txt
            backend/requirements-dev.lock.txt

      - name: Install production and audit locks with pinned pip
        shell: bash
        run: |
          set -euo pipefail
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install "pip==26.1.2"
          backend/.venv/bin/python -m pip install -r backend/requirements.lock.txt
          backend/.venv/bin/python -m pip check
          python -m venv .tooling-venv
          .tooling-venv/bin/python -m pip install "pip==26.1.2"
          .tooling-venv/bin/python -m pip install -r backend/requirements-dev.lock.txt
          .tooling-venv/bin/python -m pip check

      - name: Upgrade an empty PostgreSQL database
        shell: bash
        run: backend/.venv/bin/python -m alembic -c backend/alembic.ini upgrade head

      - name: Phase 5 PostgreSQL migration cycle
        shell: bash
        run: |
          set -euo pipefail
          backend/.venv/bin/python -m alembic -c backend/alembic.ini downgrade 20260718_0005
          backend/.venv/bin/python -m alembic -c backend/alembic.ini upgrade head

      - name: Seed synthetic PostgreSQL fixtures
        shell: bash
        run: backend/.venv/bin/python -B scripts/seed_phase2_simulation_data.py

      - name: Phase 4 multilingual menu seed and publication
        shell: bash
        run: backend/.venv/bin/python -B scripts/seed_phase4_multilingual_menu.py

      - name: Run PostgreSQL repositories, isolation, versioning, and idempotency tests
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase2

      - name: Run PostgreSQL Phase 3 safety, handoff, concurrency, and tenant-negative tests
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase3

      - name: Phase 4 PostgreSQL database duplicate-order validation
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase4/test_database_tenant_evaluation.py -k confirmation

      - name: Phase 4 PostgreSQL cross-tenant real access tests
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase4/test_database_tenant_evaluation.py -k cross_tenant

      - name: Phase 4 PostgreSQL default Mandarin canonical path tests
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase4/test_unified_canonical_path.py

      - name: Run PostgreSQL Phase 4 complete test suite
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase4

      - name: Run Phase 4 auto locale detection evaluation on PostgreSQL
        shell: bash
        run: >-
          backend/.venv/bin/python -B evaluation/run_phase4_multilingual_text_eval.py
          --mode auto
          --database-url "$PHASE4_POSTGRES_URL"

      - name: Run Phase 4 assisted evaluation on PostgreSQL
        shell: bash
        run: >-
          backend/.venv/bin/python -B evaluation/run_phase4_multilingual_text_eval.py
          --mode assisted
          --database-url "$PHASE4_POSTGRES_URL"

      - name: Phase 5 speech audit, tenant-negative, confirmation, and idempotency tests on PostgreSQL
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase5

      - name: Phase 5 metric denominator and Provider invocation tests on PostgreSQL
        shell: bash
        run: backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider backend/tests/phase5/test_evaluator_independence.py

      - name: Phase 5 persistence schema and tenant isolation tests on PostgreSQL
        shell: bash
        run: >-
          backend/.venv/bin/python -B -m pytest -q -p no:cacheprovider
          backend/tests/phase5/test_speech_audit_repository.py
          backend/tests/phase5/test_database_guards.py
          backend/tests/phase5/test_api_contract.py

      - name: Phase 5 speech pipeline evaluation on PostgreSQL
        shell: bash
        run: >-
          backend/.venv/bin/python -B evaluation/run_phase5_speech_pipeline_eval.py
          --database-url "$PHASE5_POSTGRES_URL"

      - name: Run Phase 1 runtime safety policy evaluation
        shell: bash
        run: backend/.venv/bin/python -B evaluation/run_phase1_runtime_policy_eval.py

      - name: Smoke test PostgreSQL downgrade and re-upgrade
        shell: bash
        run: |
          set -euo pipefail
          backend/.venv/bin/python -m alembic -c backend/alembic.ini downgrade base
          backend/.venv/bin/python -m alembic -c backend/alembic.ini upgrade head

      - name: Audit production dependencies
        shell: bash
        run: .tooling-venv/bin/python -m pip_audit -r backend/requirements.lock.txt
